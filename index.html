<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Math Rush — Réussir les Maths</title>

<!-- Icône et installation sur écran d'accueil -->
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#14342A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Math Rush">
<meta name="mobile-web-app-capable" content="yes">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --board: #14342A;
    --board-dark: #0E271F;
    --wood: #6B4226;
    --wood-dark: #4E2F1B;
    --chalk: #F5F1E3;
    --chalk-dim: #C9C4B4;
    --yellow: #FCD116;
    --green: #009460;
    --red: #CE1126;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Nunito',sans-serif;
    background:
      radial-gradient(ellipse at top, #2a1608 0%, #180d05 70%);
    color:var(--chalk);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:18px;
  }
  .frame{
    width:100%;
    max-width:640px;
    background:var(--wood);
    background-image:
      repeating-linear-gradient(90deg, rgba(0,0,0,0.08) 0 2px, transparent 2px 40px),
      linear-gradient(160deg, var(--wood) 0%, var(--wood-dark) 100%);
    border-radius:14px;
    padding:14px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.55), inset 0 0 0 3px rgba(0,0,0,0.2);
  }
  .board{
    position:relative;
    background: radial-gradient(ellipse at 30% 20%, #1b4534 0%, var(--board) 55%, var(--board-dark) 100%);
    border-radius:6px;
    min-height:520px;
    padding:26px 22px 22px;
    overflow:hidden;
    box-shadow: inset 0 0 60px rgba(0,0,0,0.5), inset 0 0 3px rgba(255,255,255,0.05);
  }
  .board::before{
    content:"";
    position:absolute; inset:0;
    background-image:
      radial-gradient(ellipse at 10% 90%, rgba(255,255,255,0.03) 0%, transparent 40%),
      radial-gradient(ellipse at 90% 10%, rgba(255,255,255,0.025) 0%, transparent 35%);
    pointer-events:none;
  }
  .doodles{
    position:absolute; inset:0; opacity:0.10; pointer-events:none;
    font-family:'Kalam',cursive; font-size:15px; color:var(--chalk);
    overflow:hidden;
  }
  .doodles span{position:absolute; white-space:nowrap;}

  h1,h2,h3{font-family:'Kalam',cursive; margin:0;}

  .screen{position:relative; z-index:2;}
  .hidden{display:none !important;}

  /* --- START SCREEN --- */
  .brand{
    text-align:center; margin-bottom:6px;
  }
  .brand .eyebrow{
    display:inline-block;
    font-family:'Nunito',sans-serif; font-weight:800; letter-spacing:0.12em;
    font-size:11px; color:var(--yellow); text-transform:uppercase;
    border:1.5px dashed var(--yellow); border-radius:20px; padding:4px 12px;
    margin-bottom:14px;
  }
  .title{
    font-size:56px; text-align:center; line-height:1;
    color:var(--chalk);
    text-shadow: 0 0 14px rgba(245,241,227,0.25);
    transform:rotate(-1.5deg);
    margin-bottom:2px;
  }
  .title .rush{color:var(--yellow);}
  .underline{
    width:210px; height:10px; margin:2px auto 16px; opacity:0.85;
  }
  .tagline{
    text-align:center; color:var(--chalk-dim); font-size:15px; margin-bottom:26px;
  }
  .levels{
    display:grid; grid-template-columns:1fr; gap:10px; margin-bottom:20px;
  }
  .level-btn{
    font-family:'Kalam',cursive; font-size:20px;
    background:transparent; color:var(--chalk);
    border:2px solid var(--chalk-dim); border-radius:10px;
    padding:14px 16px; cursor:pointer; text-align:left;
    display:flex; align-items:center; justify-content:space-between;
    transition:all .15s ease;
  }
  .level-btn .desc{font-family:'Nunito',sans-serif; font-size:12px; color:var(--chalk-dim); font-weight:600;}
  .level-btn:hover{border-color:var(--yellow); background:rgba(252,209,22,0.06); transform:translateX(2px);}
  .level-btn.selected{border-color:var(--green); background:rgba(0,148,96,0.15); box-shadow:0 0 0 2px var(--green) inset;}
  .flag-dot{display:inline-block; width:8px; height:8px; border-radius:50%; margin-left:8px;}

  .cta{
    display:block; width:100%;
    font-family:'Kalam',cursive; font-size:24px; font-weight:700;
    background:var(--yellow); color:#2a1e00;
    border:none; border-radius:10px; padding:15px;
    cursor:pointer; letter-spacing:0.02em;
    box-shadow:0 6px 0 #b8920a, 0 10px 18px rgba(0,0,0,0.35);
    transition:transform .08s ease;
  }
  .cta:active{transform:translateY(4px); box-shadow:0 2px 0 #b8920a;}
  .cta:disabled{opacity:0.45; cursor:not-allowed; box-shadow:none;}
  .best-line{text-align:center; margin-top:14px; font-size:13px; color:var(--chalk-dim);}
  .best-line b{color:var(--yellow);}

  /* --- GAME SCREEN --- */
  .hud{
    display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;
    font-family:'Nunito',sans-serif; font-weight:800; font-size:14px;
  }
  .hud .score{color:var(--yellow); font-size:18px;}
  .lives{display:flex; gap:5px;}
  .life{width:16px; height:16px;}
  .combo{
    color:var(--green); font-size:12px; margin-top:2px; min-height:14px; font-weight:800;
  }
  .timer-track{
    height:10px; border-radius:6px; background:rgba(255,255,255,0.08);
    overflow:hidden; margin-bottom:26px; position:relative;
  }
  .timer-fill{
    height:100%; background:linear-gradient(90deg, var(--green), var(--yellow));
    width:100%; border-radius:6px; transition:width .1s linear;
  }
  .qcounter{
    text-align:center; font-size:12px; color:var(--chalk-dim); font-weight:700; margin-bottom:6px; letter-spacing:0.06em; text-transform:uppercase;
  }
  .question-card{
    text-align:center; min-height:96px;
    display:flex; align-items:center; justify-content:center;
    margin-bottom:22px;
  }
  .question-card h2{
    font-size:30px; color:var(--chalk); line-height:1.3;
  }
  .choices{
    display:grid; grid-template-columns:1fr 1fr; gap:12px;
  }
  .choice-btn{
    font-family:'Nunito',sans-serif; font-weight:700; font-size:16px;
    background:rgba(245,241,227,0.06);
    border:2px solid rgba(245,241,227,0.25);
    color:var(--chalk); border-radius:10px;
    padding:16px 10px; cursor:pointer; transition:all .12s ease;
  }
  .choice-btn:hover:not(:disabled){border-color:var(--yellow); background:rgba(252,209,22,0.08);}
  .choice-btn:disabled{cursor:default;}
  .choice-btn.correct{background:rgba(0,148,96,0.35); border-color:var(--green); color:#fff;}
  .choice-btn.wrong{background:rgba(206,17,38,0.35); border-color:var(--red); color:#fff;}

  .flash{
    position:absolute; inset:0; pointer-events:none; opacity:0; z-index:0;
    transition:opacity .25s ease;
  }
  .flash.on{opacity:1;}
  .flash.good{background:radial-gradient(ellipse at center, rgba(0,148,96,0.28) 0%, transparent 65%);}
  .flash.bad{background:radial-gradient(ellipse at center, rgba(206,17,38,0.30) 0%, transparent 65%);}

  /* --- END SCREEN --- */
  .end-title{font-size:38px; text-align:center; margin-bottom:4px; transform:rotate(-1deg);}
  .end-score{text-align:center; font-size:52px; color:var(--yellow); font-family:'Kalam',cursive; margin:6px 0 2px;}
  .end-sub{text-align:center; color:var(--chalk-dim); font-size:13px; margin-bottom:20px;}
  .recap{
    background:rgba(0,0,0,0.2); border:1px dashed rgba(245,241,227,0.25); border-radius:10px;
    padding:12px 14px; max-height:150px; overflow-y:auto; margin-bottom:18px;
  }
  .recap-empty{color:var(--chalk-dim); font-size:13px; text-align:center; font-style:italic;}
  .recap-item{font-size:13px; margin-bottom:8px; line-height:1.4;}
  .recap-item .q{color:var(--chalk);}
  .recap-item .a{color:var(--green); font-weight:800;}
  .end-actions{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .secondary-btn{
    font-family:'Kalam',cursive; font-size:18px;
    background:transparent; color:var(--chalk);
    border:2px solid var(--chalk-dim); border-radius:10px;
    padding:12px; cursor:pointer;
  }
  .secondary-btn:hover{border-color:var(--chalk);}

  @media (max-width:420px){
    .title{font-size:42px;}
    .choices{grid-template-columns:1fr;}
    .question-card h2{font-size:24px;}
  }
</style>
</head>
<body>
<div class="frame">
  <div class="board">
    <div class="doodles" id="doodles"></div>
    <div class="flash" id="flash"></div>

    <!-- START SCREEN -->
    <div class="screen" id="screen-start">
      <div class="brand">
        <span class="eyebrow">Réussir les Maths</span>
      </div>
      <h1 class="title">MATH<span class="rush"> RUSH</span></h1>
      <svg class="underline" viewBox="0 0 210 10"><path d="M4 6 Q60 -2 105 5 T206 4" stroke="#FCD116" stroke-width="3" fill="none" stroke-linecap="round"/></svg>
      <p class="tagline">Réponds vite, réponds juste. Le tableau ne pardonne pas le temps perdu.</p>

      <div class="levels" id="levels">
        <button class="level-btn" data-level="college">
          <span>Collège <span class="flag-dot" style="background:#CE1126"></span></span>
          <span class="desc">Calcul mental, fractions, %</span>
        </button>
        <button class="level-btn" data-level="lycee">
          <span>Lycée <span class="flag-dot" style="background:#FCD116"></span></span>
          <span class="desc">Algèbre, géométrie, Pythagore</span>
        </button>
        <button class="level-btn" data-level="terminale">
          <span>Terminale <span class="flag-dot" style="background:#009460"></span></span>
          <span class="desc">Dérivées, limites, suites, trigo</span>
        </button>
      </div>

      <button class="cta" id="btn-start" disabled>Choisis un niveau</button>
      <div class="best-line" id="best-line"></div>
    </div>

    <!-- GAME SCREEN -->
    <div class="screen hidden" id="screen-game">
      <div class="hud">
        <div>
          <div class="score">Score : <span id="score">0</span></div>
          <div class="combo" id="combo"></div>
        </div>
        <div class="lives" id="lives"></div>
      </div>
      <div class="qcounter" id="qcounter">Question 1 / 12</div>
      <div class="timer-track"><div class="timer-fill" id="timer-fill"></div></div>
      <div class="question-card"><h2 id="question-text"></h2></div>
      <div class="choices" id="choices"></div>
    </div>

    <!-- END SCREEN -->
    <div class="screen hidden" id="screen-end">
      <h2 class="end-title" id="end-title">Partie terminée !</h2>
      <div class="end-score" id="end-score">0</div>
      <div class="end-sub" id="end-sub"></div>
      <div class="recap" id="recap"></div>
      <div class="end-actions">
        <button class="secondary-btn" id="btn-replay">Rejouer</button>
        <button class="secondary-btn" id="btn-change">Changer de niveau</button>
      </div>
    </div>

  </div>
</div>

<script>
/* ---------- Decorative background doodles ---------- */
(function(){
  const symbols = ["x²+y²","∑","π","√25","3x+5","∫","f(x)","Δ","%","÷","(a+b)²","∞","θ","≠","Σn"];
  const el = document.getElementById('doodles');
  for(let i=0;i<16;i++){
    const s = document.createElement('span');
    s.textContent = symbols[Math.floor(Math.random()*symbols.length)];
    s.style.left = Math.random()*90+'%';
    s.style.top = Math.random()*95+'%';
    s.style.transform = `rotate(${(Math.random()*30-15)}deg)`;
    s.style.fontSize = (12+Math.random()*14)+'px';
    el.appendChild(s);
  }
})();

/* ---------- Utility ---------- */
function rnd(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function makeChoices(correct, wrongPool){
  const wrongs = shuffle(wrongPool.filter(w => w !== correct)).slice(0,3);
  while(wrongs.length < 3){
    wrongs.push(correct + rnd(1,9) * (Math.random()<0.5?-1:1));
  }
  const all = shuffle([correct, ...wrongs]);
  return { choices: all.map(String), answerIndex: all.indexOf(correct) };
}

/* ---------- Question generators ---------- */
// Each generator returns { text, choices:[4 strings], answerIndex, explain(optional) }

const collegeGenerators = [
  () => { // addition/soustraction
    const a=rnd(12,98), b=rnd(12,98);
    const op = pick(['+','-']);
    const correct = op==='+' ? a+b : a-b;
    const {choices,answerIndex} = makeChoices(correct, [correct+1,correct-1,correct+10,correct-10]);
    return { text:`${a} ${op} ${b} = ?`, choices, answerIndex };
  },
  () => { // multiplication
    const a=rnd(3,12), b=rnd(3,12);
    const correct = a*b;
    const {choices,answerIndex} = makeChoices(correct, [correct+a,correct-a,correct+b,correct-b]);
    return { text:`${a} × ${b} = ?`, choices, answerIndex };
  },
  () => { // division exacte
    const b=rnd(2,12), q=rnd(2,12), a=b*q;
    const {choices,answerIndex} = makeChoices(q, [q+1,q-1,q+2,q-2]);
    return { text:`${a} ÷ ${b} = ?`, choices, answerIndex };
  },
  () => { // pourcentage simple
    const base = pick([50,100,200,20,80,40]);
    const pct = pick([10,20,25,50,5]);
    const correct = base*pct/100;
    const {choices,answerIndex} = makeChoices(correct, [correct+5,correct-5,correct*2,correct/2]);
    return { text:`${pct}% de ${base} = ?`, choices, answerIndex };
  },
  () => { // fraction simplification (choisir la forme simplifiée)
    const pairs = [[2,4,'1/2'],[3,9,'1/3'],[4,8,'1/2'],[6,9,'2/3'],[5,10,'1/2'],[6,8,'3/4'],[4,6,'2/3']];
    const [n,d,correct] = pick(pairs);
    const wrongPool = ['1/4','2/5','3/5','5/6','1/3','3/4','2/3','1/2'];
    const {choices,answerIndex} = makeChoices(correct, wrongPool);
    return { text:`Simplifie la fraction ${n}/${d}`, choices, answerIndex };
  },
  () => { // aire d'un rectangle
    const L=rnd(3,15), l=rnd(2,10);
    const correct = L*l;
    const {choices,answerIndex} = makeChoices(correct, [correct+L,correct-l,2*(L+l)]);
    return { text:`Aire d'un rectangle ${L} cm × ${l} cm = ? (cm²)`, choices, answerIndex };
  },
  () => { // nombre premier
    const primes = [2,3,5,7,11,13,17,19,23];
    const composites = [4,6,8,9,10,12,14,15,16,18,20,21];
    const isPrime = Math.random()<0.5;
    const n = isPrime ? pick(primes) : pick(composites);
    return { text:`${n} est-il un nombre premier ?`, choices:['Oui','Non'], answerIndex: isPrime?0:1 };
  },
];

const lyceeGenerators = [
  () => { // équation 1er degré
    const a=rnd(2,9), x=rnd(-8,8), b=rnd(-15,15);
    const c = a*x+b;
    const {choices,answerIndex} = makeChoices(x, [x+1,x-1,x+2,-x]);
    return { text:`Résous : ${a}x ${b>=0?'+':'-'} ${Math.abs(b)} = ${c}`, choices, answerIndex };
  },
  () => { // développement (a+b)(c+d) simple -> demander coefficient de x
    const a=rnd(1,5), b=rnd(1,9), c=rnd(1,5);
    // (x+b)(a x + c) expand -> a x^2 + (c+ab) x + bc ; ask coeff of x
    const coeff = c + a*b;
    const {choices,answerIndex} = makeChoices(coeff, [coeff+1,coeff-1,a*b,c]);
    return { text:`Dans (x+${b})(${a}x+${c}), le coefficient de x est ?`, choices, answerIndex };
  },
  () => { // Pythagore
    const triples = [[3,4,5],[6,8,10],[5,12,13],[8,15,17],[9,12,15],[7,24,25]];
    const [a,b,c] = pick(triples);
    const askHyp = Math.random()<0.7;
    if(askHyp){
      const {choices,answerIndex} = makeChoices(c, [c+1,c-1,a+b]);
      return { text:`Triangle rectangle, côtés ${a} et ${b}. Hypoténuse = ?`, choices, answerIndex };
    } else {
      const {choices,answerIndex} = makeChoices(a, [a+1,a-1,b]);
      return { text:`Triangle rectangle, hypoténuse ${c}, un côté ${b}. L'autre côté = ?`, choices, answerIndex };
    }
  },
  () => { // Thalès / proportionnalité simple
    const k = pick([2,3,4,0.5]);
    const base = rnd(2,12);
    const correct = base*k;
    const {choices,answerIndex} = makeChoices(correct, [correct+2,correct-2,base+k]);
    return { text:`Agrandissement d'échelle ${k}. Une longueur de ${base} cm devient ?`, choices, answerIndex };
  },
  () => { // périmètre cercle (approx pi=3.14)
    const r = rnd(2,10);
    const correct = Math.round(2*3.14*r*10)/10;
    const {choices,answerIndex} = makeChoices(correct, [Math.round(3.14*r*r*10)/10, correct+1, correct-1]);
    return { text:`Périmètre d'un cercle de rayon ${r} cm (π≈3,14) ?`, choices: [correct.toFixed(1), (correct+1).toFixed(1), (correct-1).toFixed(1), (3.14*r*r).toFixed(1)].filter((v,i,a)=>a.indexOf(v)===i).slice(0,4), answerIndex: 0 };
  },
  () => { // factorisation simple: trouver facteur commun
    const f = rnd(2,7), a=rnd(2,9), b=rnd(2,9);
    // f*a*x + f*b -> facteur commun f
    const {choices,answerIndex} = makeChoices(f, [f+1,f-1,a,b]);
    return { text:`Facteur commun dans ${f*a}x + ${f*b} ?`, choices, answerIndex };
  },
];

const terminaleGenerators = [
  () => { // dérivée de puissance
    const n = rnd(2,6);
    const correct = n;
    const {choices,answerIndex} = makeChoices(correct, [n+1,n-1,n*2]);
    return { text:`Dérivée de f(x) = x^${n} : f'(x) = ${n}x^? — quel exposant ?`, choices: [String(n-1), String(n), String(n+1), String(n-2)], answerIndex: 0 };
  },
  () => { // dérivée coefficient
    const a = rnd(2,9), n=rnd(2,4);
    const coeff = a*n;
    const {choices,answerIndex} = makeChoices(coeff, [a+n,coeff+1,coeff-1]);
    return { text:`f(x) = ${a}x^${n}. Coefficient de f'(x) = ?`, choices, answerIndex };
  },
  () => { // limite simple en +infini d'un polynome (signe du terme dominant)
    const a = rnd(-9,9) || 3;
    const n = rnd(2,4);
    const sign = a>0 ? '+∞' : '-∞';
    return { text:`lim x→+∞ de ${a}x^${n} = ?`, choices: shuffle(['+∞','-∞','0','1']), answerIndex: -1, __needFix:true, a, sign };
  },
  () => { // suite arithmétique
    const u0 = rnd(1,10), r = rnd(2,6), n = rnd(3,8);
    const correct = u0 + r*n;
    const {choices,answerIndex} = makeChoices(correct, [correct+r,correct-r,u0+n]);
    return { text:`Suite arithmétique u₀=${u0}, raison ${r}. u${n} = ?`, choices, answerIndex };
  },
  () => { // suite géométrique simple
    const u0 = pick([1,2,3]), r = pick([2,3]), n = rnd(2,4);
    const correct = u0*Math.pow(r,n);
    const {choices,answerIndex} = makeChoices(correct, [correct+r,correct-r,u0*r*n]);
    return { text:`Suite géométrique u₀=${u0}, raison ${r}. u${n} = ?`, choices, answerIndex };
  },
  () => { // trigonométrie valeurs remarquables
    const table = [
      ['sin(0)','0'], ['cos(0)','1'], ['sin(90°)','1'], ['cos(90°)','0'],
      ['sin(30°)','1/2'], ['cos(60°)','1/2'], ['tan(45°)','1']
    ];
    const [q,correct] = pick(table);
    const wrongPool = ['0','1','1/2','√2/2','√3/2','-1'];
    const {choices,answerIndex} = makeChoices(correct, wrongPool);
    return { text:`${q} = ?`, choices, answerIndex };
  },
  () => { // logarithme / exponentielle basique
    const pairs = [['ln(1)','0'],['ln(e)','1'],['e^0','1'],['log(1)','0'],['log(10)','1']];
    const [q,correct] = pick(pairs);
    const {choices,answerIndex} = makeChoices(correct, ['0','1','e','10']);
    return { text:`${q} = ?`, choices, answerIndex };
  },
];
// fix the limit generator's random shuffle answer index issue
function fixTerminale(q){
  if(q.__needFix){
    const correct = q.sign;
    q.answerIndex = q.choices.indexOf(correct);
    delete q.__needFix;
  }
  return q;
}

const LEVELS = {
  college:   { label:'Collège',   gens: collegeGenerators,   time: 16, qCount: 12 },
  lycee:     { label:'Lycée',     gens: lyceeGenerators,     time: 20, qCount: 12 },
  terminale: { label:'Terminale', gens: terminaleGenerators, time: 24, qCount: 12 },
};

/* ---------- Game state ---------- */
let state = {
  level: null,
  qIndex: 0,
  score: 0,
  lives: 3,
  combo: 0,
  timeLeft: 0,
  timerId: null,
  ticksTotal: 0,
  wrongLog: [],
  currentQ: null,
};

const els = {
  start: document.getElementById('screen-start'),
  game: document.getElementById('screen-game'),
  end: document.getElementById('screen-end'),
  levelBtns: document.querySelectorAll('.level-btn'),
  btnStart: document.getElementById('btn-start'),
  bestLine: document.getElementById('best-line'),
  score: document.getElementById('score'),
  combo: document.getElementById('combo'),
  lives: document.getElementById('lives'),
  qcounter: document.getElementById('qcounter'),
  timerFill: document.getElementById('timer-fill'),
  qtext: document.getElementById('question-text'),
  choices: document.getElementById('choices'),
  flash: document.getElementById('flash'),
  endTitle: document.getElementById('end-title'),
  endScore: document.getElementById('end-score'),
  endSub: document.getElementById('end-sub'),
  recap: document.getElementById('recap'),
  btnReplay: document.getElementById('btn-replay'),
  btnChange: document.getElementById('btn-change'),
};

/* ---------- Storage helpers (best score, per level) ---------- */
async function getBest(level){
  try{
    const res = await window.storage.get('mathrush-best-'+level, false);
    return res ? parseInt(res.value,10) : 0;
  }catch(e){ return 0; }
}
async function setBest(level, value){
  try{ await window.storage.set('mathrush-best-'+level, String(value), false); }
  catch(e){ /* ignore storage errors, non-critical */ }
}

/* ---------- Level selection ---------- */
let selectedLevel = null;
els.levelBtns.forEach(btn=>{
  btn.addEventListener('click', async ()=>{
    els.levelBtns.forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedLevel = btn.dataset.level;
    els.btnStart.disabled = false;
    els.btnStart.textContent = 'Commencer';
    const best = await getBest(selectedLevel);
    els.bestLine.innerHTML = best>0 ? `Meilleur score (${LEVELS[selectedLevel].label}) : <b>${best}</b>` : '';
  });
});

els.btnStart.addEventListener('click', ()=> startGame(selectedLevel));

/* ---------- Game flow ---------- */
function startGame(level){
  state = { level, qIndex:0, score:0, lives:3, combo:0, timeLeft:0, timerId:null, wrongLog:[], currentQ:null };
  els.start.classList.add('hidden');
  els.end.classList.add('hidden');
  els.game.classList.remove('hidden');
  renderLives();
  updateScore();
  nextQuestion();
}

function renderLives(){
  const heartSVG = (alive)=>`<svg class="life" viewBox="0 0 24 24" fill="${alive?'#CE1126':'rgba(255,255,255,0.15)'}"><path d="M12 21s-7.5-4.6-10-9.3C0.3 8 2 4 6 4c2 0 3.5 1.1 4.5 2.6C11.5 5.1 13 4 15 4c4 0 5.7 4 4 7.7C19.5 16.4 12 21 12 21z"/></svg>`;
  let html='';
  for(let i=0;i<3;i++) html += heartSVG(i<state.lives);
  els.lives.innerHTML = html;
}

function updateScore(){
  els.score.textContent = state.score;
  els.combo.textContent = state.combo>=2 ? `Combo ×${state.combo} 🔥` : '';
}

function genQuestion(level){
  const cfg = LEVELS[level];
  let q = pick(cfg.gens)();
  if(q.__needFix) q = fixTerminale(q);
  return q;
}

function nextQuestion(){
  if(state.qIndex >= LEVELS[state.level].qCount){
    return endGame(true);
  }
  state.qIndex++;
  state.currentQ = genQuestion(state.level);
  els.qcounter.textContent = `Question ${state.qIndex} / ${LEVELS[state.level].qCount}`;
  els.qtext.textContent = state.currentQ.text;
  els.choices.innerHTML = '';
  state.currentQ.choices.forEach((c, i)=>{
    const b = document.createElement('button');
    b.className = 'choice-btn';
    b.textContent = c;
    b.addEventListener('click', ()=> submitAnswer(i));
    els.choices.appendChild(b);
  });
  startTimer();
}

function startTimer(){
  clearInterval(state.timerId);
  const total = LEVELS[state.level].time * 10; // ticks of 100ms
  state.ticksTotal = total;
  state.timeLeft = total;
  els.timerFill.style.width = '100%';
  state.timerId = setInterval(()=>{
    state.timeLeft--;
    els.timerFill.style.width = Math.max(0,(state.timeLeft/state.ticksTotal*100))+'%';
    if(state.timeLeft<=0){
      clearInterval(state.timerId);
      submitAnswer(-1); // timeout
    }
  }, 100);
}

function flashScreen(good){
  els.flash.classList.remove('good','bad','on');
  void els.flash.offsetWidth;
  els.flash.classList.add(good?'good':'bad','on');
  setTimeout(()=> els.flash.classList.remove('on'), 300);
}

function submitAnswer(choiceIndex){
  clearInterval(state.timerId);
  const q = state.currentQ;
  const buttons = els.choices.querySelectorAll('.choice-btn');
  buttons.forEach(b=> b.disabled = true);

  const correct = choiceIndex === q.answerIndex;
  if(q.answerIndex>=0 && buttons[q.answerIndex]) buttons[q.answerIndex].classList.add('correct');
  if(!correct && choiceIndex>=0 && buttons[choiceIndex]) buttons[choiceIndex].classList.add('wrong');

  if(correct){
    state.combo++;
    const speedBonus = Math.round((state.timeLeft/state.ticksTotal) * 15);
    const comboBonus = Math.min(state.combo-1, 5) * 3;
    state.score += 10 + speedBonus + comboBonus;
    flashScreen(true);
  } else {
    state.combo = 0;
    state.lives--;
    flashScreen(false);
    state.wrongLog.push({ q: q.text, a: (q.answerIndex>=0 ? q.choices[q.answerIndex] : '—') });
    renderLives();
  }
  updateScore();

  setTimeout(()=>{
    if(state.lives<=0){ endGame(false); }
    else{ nextQuestion(); }
  }, 850);
}

async function endGame(completed){
  els.game.classList.add('hidden');
  els.end.classList.remove('hidden');
  els.endTitle.textContent = completed ? 'Série terminée ! 🎉' : 'Plus de vies… 💔';
  els.endScore.textContent = state.score;

  const best = await getBest(state.level);
  let subText = `Niveau ${LEVELS[state.level].label} — ${state.qIndex} question(s) jouée(s)`;
  if(state.score > best){
    await setBest(state.level, state.score);
    subText += ` — Nouveau record !`;
  } else if(best>0){
    subText += ` — Record : ${best}`;
  }
  els.endSub.textContent = subText;

  if(state.wrongLog.length===0){
    els.recap.innerHTML = '<div class="recap-empty">Sans faute ! Aucune erreur à revoir. 👏</div>';
  } else {
    els.recap.innerHTML = state.wrongLog.map(w=>
      `<div class="recap-item"><span class="q">${w.q}</span><br>Bonne réponse : <span class="a">${w.a}</span></div>`
    ).join('');
  }
}

els.btnReplay.addEventListener('click', ()=> startGame(state.level));
els.btnChange.addEventListener('click', ()=>{
  els.end.classList.add('hidden');
  els.start.classList.remove('hidden');
});
</script>
</body>
</html>
